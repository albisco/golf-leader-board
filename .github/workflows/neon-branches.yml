name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Post Neon Branch URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = 'preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}';
            const previewUrl = 'https://console.neon.tech/app/projects/${{ vars.NEON_PROJECT_ID }}/branches?branch=' + branchName;
            
            const body = `🌿 **Preview Branch Created**
            
            Neon branch: **${branchName}**
            
            [View in Neon Console](${previewUrl})
            
            Database will be automatically deleted when PR is closed.`;
            
            github.rest.issues.createComment({
              issue_number: ${{ github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Post Database URL to PR (for Railway)
        uses: actions/github-script@v7
        with:
          script: |
            // Set Railway environment variable via repository dispatch
            // The database URL is available but we won't expose it directly in comments
            // Railway preview deployments can use secrets or environment variables
            
            console.log('Neon branch created. Database URL available via: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}');

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Post Branch Deleted Comment
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = 'preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}';
            
            const body = `🗑️ **Preview Branch Deleted**
            
            Neon branch: **${branchName}** has been removed.`;
            
            github.rest.issues.createComment({
              issue_number: ${{ github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });